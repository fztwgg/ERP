<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>图文广告店 ERP 管理系统</title>
<style>
:root{--sidebar-w:220px;--primary:#4f46e5;--danger:#dc2626;--success:#16a34a;--warning:#f59e0b;--bg:#f1f5f9;--card-bg:#fff;--text:#1e293b;--border:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
/* 登录页 */
#loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
#loginPage .login-card{background:#fff;border-radius:16px;padding:40px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
#loginPage .login-card h2{text-align:center;margin-bottom:8px;font-size:24px;color:var(--text)}
#loginPage .login-card .sub{text-align:center;color:#94a3b8;margin-bottom:32px;font-size:13px}
#loginPage .form-group{margin-bottom:20px}
#loginPage .form-group label{display:block;margin-bottom:6px;font-weight:600;font-size:14px;color:#475569}
#loginPage .form-group input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:15px;transition:border .2s}
#loginPage .form-group input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
#loginPage .btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s}
#loginPage .btn-primary{background:var(--primary);color:#fff}
#loginPage .btn-primary:hover{background:#4338ca}
#loginPage .btn-primary:disabled{background:#a5b4fc;cursor:not-allowed}
#loginPage .btn-text{background:none;color:var(--primary);margin-top:12px;font-size:14px}
#loginPage .err-msg{color:var(--danger);font-size:13px;margin-top:8px;display:none;text-align:center}
#regForm{display:none}

/* 应用主体 */
#app{display:none;min-height:100vh}
/* 侧边栏 */
#sidebar{position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;background:#1e293b;color:#fff;z-index:100;overflow-y:auto;display:flex;flex-direction:column}
#sidebar .logo{padding:20px;font-size:18px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
#sidebar .nav-list{list-style:none;padding:8px 0;flex:1}
#sidebar .nav-list li{padding:0}
#sidebar .nav-list a{display:flex;align-items:center;padding:12px 20px;color:#94a3b8;text-decoration:none;font-size:15px;transition:all .15s;gap:10px}
#sidebar .nav-list a:hover{background:rgba(255,255,255,.06);color:#fff}
#sidebar .nav-list a.active{background:rgba(79,70,229,.3);color:#fff;border-right:3px solid var(--primary)}
#sidebar .nav-icon{font-size:18px;width:24px;text-align:center}
#sidebar .user-info{padding:16px 20px;border-top:1px solid rgba(255,255,255,.1);font-size:13px;color:#94a3b8}
#sidebar .user-info .logout-btn{display:block;margin-top:8px;color:var(--danger);cursor:pointer;background:none;border:none;font-size:13px;text-align:left;padding:0}
#mainContent{margin-left:var(--sidebar-w);padding:24px}

/* 状态标签 */
.status-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600}
.status-pending{background:#fef3c7;color:#92400e}
.status-production{background:#dbeafe;color:#1e40af}
.status-done{background:#d1fae5;color:#065f46}
.status-delivered{background:#e0e7ff;color:#3730a3}
.status-settled{background:#fce7f3;color:#9d174d}

/* 通用元素 */
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-header h1{font-size:22px;font-weight:700}
.btn{padding:8px 18px;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-sm{padding:5px 12px;font-size:13px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#4338ca}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-warning{background:var(--warning);color:#fff}
.btn-outline{background:#fff;color:var(--primary);border:1px solid var(--primary)}
.btn-outline:hover{background:#f5f3ff}

.card{background:var(--card-bg);border-radius:10px;box-shadow:var(--shadow);padding:20px;margin-bottom:20px}
.card h3{font-size:16px;margin-bottom:16px;color:var(--text)}

/* 表格 */
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{background:#f8fafc;padding:10px 12px;text-align:left;font-weight:600;color:#475569;border-bottom:2px solid var(--border);white-space:nowrap}
tbody td{padding:10px 12px;border-bottom:1px solid var(--border)}
tbody tr:hover{background:#f8fafc}
.table-wrap{overflow-x:auto}

/* Tab */
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tab-btn{padding:8px 20px;background:none;border:none;font-size:14px;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}

/* 弹窗 */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;width:90%;max-width:900px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:18px}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#94a3b8;padding:4px 8px;border-radius:4px}
.modal-close:hover{background:#f1f5f9}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* 表单 */
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:16px}
.form-group label{display:block;margin-bottom:4px;font-weight:600;font-size:13px;color:#475569}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px}
.form-group textarea{resize:vertical;min-height:80px}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--primary)}

/* 统计卡片 */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--card-bg);border-radius:10px;box-shadow:var(--shadow);padding:20px;display:flex;align-items:center;gap:16px}
.stat-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px}
.stat-icon.blue{background:#dbeafe;color:#2563eb}
.stat-icon.green{background:#d1fae5;color:#059669}
.stat-icon.orange{background:#fef3c7;color:#d97706}
.stat-icon.purple{background:#e0e7ff;color:#6d28d9}
.stat-value{font-size:28px;font-weight:700;line-height:1.2}
.stat-label{font-size:13px;color:#64748b}

/* 进度条 */
.progress-steps{display:flex;gap:0;margin-bottom:16px}
.progress-step{flex:1;text-align:center;padding:10px 8px;background:#f1f5f9;color:#94a3b8;font-size:12px;position:relative;cursor:pointer;border-radius:6px;margin:0 2px;transition:all .2s}
.progress-step.active{background:var(--primary);color:#fff}
.progress-step.done{background:#d1fae5;color:#065f46}

/* 面包屑/搜索 */
.search-bar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{padding:8px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px;width:250px}
.search-bar select{padding:8px 14px;border:1px solid var(--border);border-radius:6px;font-size:14px}

/* 复选框 */
input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--primary)}

/* 金额 */
.money{font-family:'SF Mono','Consolas',monospace;text-align:right}
.text-right{text-align:right}
.text-center{text-align:center}
.text-danger{color:var(--danger)}
.text-success{color:var(--success)}

/* 空状态 */
.empty-state{text-align:center;padding:48px 20px;color:#94a3b8}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px}

/* 响应式 */
@media(max-width:768px){
  :root{--sidebar-w:60px}
  #sidebar .logo{font-size:14px;padding:12px 8px}
  #sidebar .nav-list a span{display:none}
  #sidebar .nav-list a{justify-content:center;padding:12px 8px}
  #sidebar .user-info{font-size:10px;padding:10px 8px;text-align:center}
  .page-header{flex-direction:column}
}
</style>
</head>
<body>

<!-- 登录页 -->
<div id="loginPage">

<script>
// ============================================================

// ============================================================
var SUPABASE_URL = 'https://jceneloygpumoczthbvq.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpjZW5lbG95Z3B1bW9jenRoYnZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1NzMxNzYsImV4cCI6MjA5NTE0OTE3Nn0.puz8Z3behlGAx2tFQ3Yfw-rnRhe2jI42T1pvZsibOgc';
var supabase = null;
var currentUser = null;
var currentRole = 'staff';

// 立即初始化 Supabase
if (typeof window.supabase !== 'undefined') {
  supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

} else {

// ============================================================
//  登录/注册
// ============================================================
function showLogin() { document.getElementById('loginForm').style.display='block'; document.getElementById('regForm').style.display='none'; }
function showRegister() { document.getElementById('loginForm').style.display='none'; document.getElementById('regForm').style.display='block'; }

function doLogin() {
  var account = document.getElementById('loginAccount').value.trim();
  var pass = document.getElementById('loginPass').value;
  var errEl = document.getElementById('loginErr');
  var btn = document.getElementById('loginBtn');
  if (!account || !pass) { errEl.textContent='请输入账号名和密码'; errEl.style.display='block'; return; }
  btn.disabled=true; btn.textContent='登录中...'; errEl.style.display='none';
  var email = account + '@erp.local';
  supabase.auth.signInWithPassword({email:email,password:pass}).then(function(res){
    btn.disabled=false; btn.textContent='登 录';
    if (res.error) { errEl.textContent='账号或密码错误，请重试'; errEl.style.display='block'; return; }
    loadUserAndShowApp(res.data.user);
  }).catch(function(err){
    btn.disabled=false; btn.textContent='登 录';
    errEl.textContent='登录失败：'+(err.message||err); errEl.style.display='block';
  });
}

function doRegister() {
  var account = document.getElementById('regAccount').value.trim();
  var pass = document.getElementById('regPass').value;
  var pass2 = document.getElementById('regPass2').value;
  var errEl = document.getElementById('regErr');
  var btn = document.getElementById('regBtn');
  if (!account||!pass) { errEl.textContent='请输入账号名和密码'; errEl.style.display='block'; return; }
  if (pass!==pass2) { errEl.textContent='两次输入的密码不一致'; errEl.style.display='block'; return; }
  if (pass.length<6) { errEl.textContent='密码长度至少6位'; errEl.style.display='block'; return; }
  btn.disabled=true; btn.textContent='注册中...'; errEl.style.display='none';
  var email = account + '@erp.local';
  supabase.auth.signUp({email:email,password:pass,options:{data:{account:account,role:'staff'}}}).then(function(res){
    btn.disabled=false; btn.textContent='注 册';
    if (res.error) { errEl.textContent='注册失败：'+res.error.message; errEl.style.display='block'; return; }
    alert('注册成功！请登录。');
    showLogin();
  }).catch(function(err){
    btn.disabled=false; btn.textContent='注 册';
    errEl.textContent='注册失败：'+(err.message||err); errEl.style.display='block';
  });
}

function doLogout() {
  supabase.auth.signOut().then(function(){
    document.getElementById('app').style.display='none';
    document.getElementById('loginPage').style.display='flex';
    currentUser=null; currentRole='staff';
  });
}

// ============================================================
//  用户信息加载
// ============================================================
function loadUserAndShowApp(user) {
  currentUser=user;
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('sidebarUser').textContent=user.email.split('@')[0];
  // 读取角色
  supabase.from('profiles').select('role').eq('id',user.id).single().then(function(res){
    if (res.data) { currentRole=res.data.role; }
    // 管理员可见员工管理
    var adminItems = document.querySelectorAll('.admin-only');
    for (var i=0;i<adminItems.length;i++) { adminItems[i].style.display=currentRole==='admin'?'':'none'; }
    // 默认显示订单管理
    navigateTo('orders');
  }).catch(function(){
    navigateTo('orders');
  });
}

// ============================================================
//  导航
// ============================================================
function navigateTo(page) {
  // 高亮
  var links = document.querySelectorAll('.nav-item');
  for (var i=0;i<links.length;i++) {
    links[i].classList.remove('active');
    if (links[i].getAttribute('data-page')===page) links[i].classList.add('active');
  }
  // 渲染页面
  var fn = pageRenderers[page];
  if (fn) { fn(); }
}

var pageRenderers = {};

// 侧边栏点击
document.querySelectorAll('.nav-item').forEach(function(a){
  a.addEventListener('click',function(e){e.preventDefault();navigateTo(this.getAttribute('data-page'));});
});

// ============================================================
//  工具函数
// ============================================================
function formatMoney(n) { return '¥'+Number(n||0).toFixed(2); }
function formatDate(d) { if (!d) return ''; var dt=new Date(d); var y=dt.getFullYear(); var m=String(dt.getMonth()+1).padStart(2,'0'); var day=String(dt.getDate()).padStart(2,'0'); return y+'-'+m+'-'+day; }
function todayStr(){ var d=new Date(); var y=d.getFullYear(); var m=String(d.getMonth()+1).padStart(2,'0'); var day=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+day; }
function getStatusClass(s) { var map={'待确认':'status-pending','生产中':'status-production','已完工':'status-done','已送货':'status-delivered','已结算':'status-settled'}; return map[s]||''; }
function showToast(msg) { var t=document.createElement('div'); t.textContent=msg; t.style.cssText='position:fixed;top:20px;right:20px;background:#1e293b;color:#fff;padding:12px 24px;border-radius:8px;z-index:9999;font-size:14px;animation:fadeIn .3s'; document.body.appendChild(t); setTimeout(function(){t.remove();},2500); }
function confirmDialog(msg, cb) { if (confirm(msg)) cb(); }

// ============================================================
//  CSV 工具
// ============================================================
function csvToArray(str) {
  var rows=[]; var lines=str.split(/\r?\n/).filter(function(l){return l.trim();});
  for (var i=0;i<lines.length;i++) {
    var cols=[]; var col=''; var inQuote=false;
    for (var j=0;j<lines[i].length;j++) {
      var ch=lines[i][j];
      if (ch==='"') { inQuote=!inQuote; }
      else if (ch===','&&!inQuote) { cols.push(col.trim()); col=''; }
      else { col+=ch; }
    }
    cols.push(col.trim()); rows.push(cols);
  }
  return rows;
}
function arrayToCsv(arr) { return arr.map(function(r){return r.map(function(c){var s=String(c||'');return s.indexOf(',')>=0?'"'+s+'"':s;}).join(',');}).join('\n'); }
function downloadCsv(arr, filename) {
  var bom='\uFEFF'; var csv=bom+arrayToCsv(arr); var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
}

// ============================================================
//  日期工具
// ============================================================
function daysAgo(n) { var d=new Date(); d.setDate(d.getDate()-n); var y=d.getFullYear(); var m=String(d.getMonth()+1).padStart(2,'0'); var day=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+day; }

// ============================================================
//  订单编号生成
// ============================================================
function generateOrderNo(callback) {
  var prefix = todayStr().replace(/-/g,'');
  supabase.from('orders').select('order_no').like('order_no',prefix+'%').order('order_no',{ascending:false}).limit(1).then(function(res){
    var seq=1;
    if (res.data && res.data.length>0) {
      var last=res.data[0].order_no; var num=parseInt(last.substring(8));
      if (!isNaN(num)) seq=num+1;
    }
    callback(prefix+String(seq).padStart(3,'0'));
  });
}

// ============================================================
//  初始化
// ============================================================
function initApp() {
  supabase.auth.getSession().then(function(res){
    var session = res.data.session;
    if (session) { loadUserAndShowApp(session.user); }
    else { document.getElementById('loginPage').style.display='flex'; }
  });
  supabase.auth.onAuthStateChange(function(_event,session){
    if (!session) { document.getElementById('app').style.display='none'; document.getElementById('loginPage').style.display='flex'; currentUser=null; }
    else { loadUserAndShowApp(session.user); }
  });
}
document.addEventListener('DOMContentLoaded', initApp);

// ============================================================
//  页面渲染 - 工作台
// ============================================================
pageRenderers.dashboard = function() {
  var h='<div class="page-header"><h1>📊 工作台</h1></div>';
  h+='<div class="stats-grid" id="dashStats">加载中...</div>';
  h+='<div class="card"><h3>📈 近7天收入趋势</h3><div style="height:300px"><canvas id="revenueChart"></canvas></div></div>';
  document.getElementById('pageContent').innerHTML=h;
  loadDashboard();
};

function loadDashboard() {
  // 统计
  var today = todayStr();
  supabase.from('orders').select('status,total_amount').then(function(oRes){
    var orders=oRes.data||[];
    var todayCount=0,productionCount=0,deliveredCount=0,totalRevenue=0;
    for (var i=0;i<orders.length;i++) {
      var o=orders[i];
      totalRevenue+=Number(o.total_amount||0);
      if (o.status==='生产中') productionCount++;
      if (o.status==='已送货') deliveredCount++;
    }
    document.getElementById('dashStats').innerHTML=
      '<div class="stat-card"><div class="stat-icon blue">📋</div><div><div class="stat-value">'+orders.length+'</div><div class="stat-label">总订单数</div></div></div>'+
      '<div class="stat-card"><div class="stat-icon orange">⚙</div><div><div class="stat-value">'+productionCount+'</div><div class="stat-label">生产中</div></div></div>'+
      '<div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-value">'+deliveredCount+'</div><div class="stat-label">已送货</div></div></div>'+
      '<div class="stat-card"><div class="stat-icon purple">💰</div><div><div class="stat-value">'+formatMoney(totalRevenue)+'</div><div class="stat-label">总营业额</div></div></div>';
    // 图表
    drawChart(orders);
  });
}

function drawChart(orders) {
  var days=[]; var values=[];
  for (var i=6;i>=0;i--) { days.push(daysAgo(i)); values.push(0); }
  for (var j=0;j<orders.length;j++) {
    var o=orders[j]; if (!o.created_at) continue;
    var d=formatDate(o.created_at);
    var idx=days.indexOf(d);
    if (idx>=0) values[idx]+=Number(o.total_amount||0);
  }
  var ctx=document.getElementById('revenueChart');
  if (!ctx) return;
  new Chart(ctx,{type:'bar',data:{labels:days,datasets:[{label:'营业额',data:values,backgroundColor:'#4f46e5',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
}

//  页面渲染 - 订单管理
// ============================================================
var ordersData = [];
var ordersSelected = {};
var ordersTab = 'all';
var ordersSearchText = '';

pageRenderers.orders = function() {
  var h='<div class="page-header"><h1>📋 订单管理</h1><div>';
  h+='<button class="btn btn-primary" onclick="openOrderModal()">+ 新建订单</button>';
  h+='<button class="btn btn-outline btn-sm" onclick="toggleOrderSelect()">全选</button>';
  h+='<button class="btn btn-success btn-sm" id="btnBatchSettle" onclick="batchSettle()" disabled>批量结算</button>';
  h+='<button class="btn btn-outline btn-sm" onclick="exportOrders()">导出CSV</button>';
  h+='<button class="btn btn-outline btn-sm" onclick="openOrderSearch()">🔍 高级搜索</button>';
  h+='</div></div>';

  h+='<div class="tabs">';
  h+='<button class="tab-btn active" onclick="switchOrderTab(\'all\',this)">全部</button>';
  h+='<button class="tab-btn" onclick="switchOrderTab(\'today\',this)">今天</button>';
  h+='<button class="tab-btn" onclick="switchOrderTab(\'yesterday\',this)">昨天</button>';
  h+='<button class="tab-btn" onclick="switchOrderTab(\'week\',this)">近7天</button>';
  h+='</div>';

  h+='<div class="search-bar">';
  h+='<input type="text" id="orderSearch" placeholder="搜索订单编号/客户/项目名称..." onkeydown="orderSearchKey(event)">';
  h+='</div>';

  h+='<div class="card"><div class="table-wrap"><table><thead><tr>';
  h+='<th width="40"><input type="checkbox" id="orderSelectAll" onchange="toggleAllOrders(this)"></th>';
  h+='<th>订单编号</th><th>开单日期</th><th>客户</th><th>联系人</th><th>项目名称</th><th>金额</th><th>生产状态</th><th>收款状态</th><th>操作</th>';
  h+='</tr></thead><tbody id="ordersTbody"></tbody></table></div></div>';
  document.getElementById('pageContent').innerHTML=h;
  ordersSelected={};
  loadOrders();
};

function loadOrders() {
  var q = supabase.from('orders').select('*').order('created_at',{ascending:false});
  if (ordersTab==='today') { var t=todayStr(); q=q.gte('created_at',t).lt('created_at',t+'T23:59:59'); }
  else if (ordersTab==='yesterday') { var y=daysAgo(1); q=q.gte('created_at',y).lt('created_at',y+'T23:59:59'); }
  else if (ordersTab==='week') q=q.gte('created_at',daysAgo(7));
  // 搜索过滤将在客户端进行（支持中文输入）
  q.then(function(res){
    if (res.error) { console.error(res.error); return; }
    ordersData = res.data||[];
    renderOrdersTable();
  });
}

function renderOrdersTable() {
  var data=ordersData;
  if (ordersSearchText) {
    var kw=ordersSearchText.toLowerCase();
    data=data.filter(function(o){
      return (o.order_no||'').toLowerCase().indexOf(kw)>=0 ||
             (o.customer_name||'').toLowerCase().indexOf(kw)>=0 ||
             (o.project_name||'').toLowerCase().indexOf(kw)>=0 ||
             (o.contact_name||'').toLowerCase().indexOf(kw)>=0;
    });
  }
  var rows='';
  for (var i=0;i<data.length;i++) {
    (function(o){
      var settled=o.payment_status==='已结算';
      var chk=ordersSelected[o.id]?'checked':'';
      rows+='<tr>';
      rows+='<td><input type="checkbox" '+chk+' onchange="toggleOrder('+o.id+',this)" '+(settled?'disabled':'')+'></td>';
      rows+='<td>'+o.order_no+'</td>';
      rows+='<td>'+formatDate(o.order_date)+'</td>';
      rows+='<td>'+(o.customer_name||'-')+'</td>';
      rows+='<td>'+(o.contact_name||'-')+'</td>';
      rows+='<td>'+(o.project_name||'-')+'</td>';
      rows+='<td class="money">'+formatMoney(o.total_amount)+'</td>';
      rows+='<td><span class="status-tag '+getStatusClass(o.status)+'">'+(o.status||'待确认')+'</span></td>';
      rows+='<td><span class="status-tag '+(settled?'status-settled':'status-pending')+'">'+(o.payment_status||'未结算')+'</span></td>';
      rows+='<td>';
      rows+='<button class="btn btn-outline btn-sm" onclick="openOrderModal('+o.id+')">编辑</button> ';
      if (!settled) rows+='<button class="btn btn-danger btn-sm" onclick="deleteOrder('+o.id+')">删除</button>';
      rows+='</td></tr>';
    })(data[i]);
  }
  if (!rows) rows='<tr><td colspan="10" class="empty-state"><div class="empty-icon">📋</div><p>暂无订单</p></td></tr>';
  document.getElementById('ordersTbody').innerHTML=rows;
  updateBatchBtn();
}

function switchOrderTab(tab, el) {
  ordersTab=tab;
  var btns=document.querySelectorAll('.tab-btn');
  for (var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  if (el) el.classList.add('active');
  loadOrders();
}

function orderSearchKey(e) {
  if (e.key==='Enter' || e.keyCode===13) {
    ordersSearchText=e.target.value.trim();
    renderOrdersTable();
  }
}

function toggleOrder(id, cb) { if (cb.checked) ordersSelected[id]=true; else delete ordersSelected[id]; updateBatchBtn(); }

function toggleAllOrders(cb) {
  ordersSelected={};
  if (cb.checked) {
    for (var i=0;i<ordersData.length;i++) {
      if (ordersData[i].payment_status!=='已结算') ordersSelected[ordersData[i].id]=true;
    }
  }
  renderOrdersTable();
}

function toggleOrderSelect() {
  var any=Object.keys(ordersSelected).length>0;
  var newState=!any;
  ordersSelected={};
  if (newState) {
    for (var i=0;i<ordersData.length;i++) {
      if (ordersData[i].payment_status!=='已结算') ordersSelected[ordersData[i].id]=true;
    }
  }
  document.getElementById('orderSelectAll').checked=newState;
  renderOrdersTable();
}

function updateBatchBtn() {
  var ids=Object.keys(ordersSelected).filter(function(k){return ordersSelected[k];});
  document.getElementById('btnBatchSettle').disabled=ids.length===0;
}

function batchSettle() {
  var ids=Object.keys(ordersSelected).filter(function(k){return ordersSelected[k];});
  if (ids.length===0) { alert('请先选择订单'); return; }
  confirmDialog('确定要批量结算 '+ids.length+' 个订单吗？', function(){
    supabase.from('orders').update({payment_status:'已结算',settled_at:new Date().toISOString()}).in('id',ids).then(function(res){
      if (res.error) { alert('结算失败：'+res.error.message); return; }
      showToast('已成功结算 '+ids.length+' 个订单');
      ordersSelected={};
      loadOrders();
    });
  });
}

function exportOrders() {
  var rows=[['订单编号','开单日期','客户','联系人','项目名称','金额','生产状态','收款状态']];
  for (var i=0;i<ordersData.length;i++) {
    var o=ordersData[i];
    rows.push([o.order_no,formatDate(o.order_date),o.customer_name||'',o.contact_name||'',o.project_name||'',o.total_amount,o.status||'',o.payment_status||'']);
  }
  downloadCsv(rows,'订单导出_'+todayStr()+'.csv');
}

  h+='<div class="progress-step" id="ps3" onclick="setOrderStatus(\'已完工\')">已完工</div>';
  h+='<div class="progress-step" id="ps4" onclick="setOrderStatus(\'已送货\')">已送货</div>';

    supabase.from('orders').select('*').eq('id',id).single().then(function(res){

    });
  } else {

function closeOrderModal() {
  var overlay=document.getElementById('orderModalOverlay');
  if (overlay) overlay.remove();
  editingOrderId=null;
}

function fillOrderForm(o) {
  document.getElementById('omOrderNo').value=o.order_no||'';
  document.getElementById('omOrderDate').value=formatDate(o.order_date||o.created_at);
  document.getElementById('omCustomer').value=o.customer_id||'';
  document.getElementById('omContact').value=o.contact_name||'';
  document.getElementById('omProject').value=o.project_name||'';
  document.getElementById('omReq').value=o.production_req||'';
  document.getElementById('omStatus').value=o.status||'待确认';
  document.getElementById('omPaymentStatus').value=o.payment_status||'未结算';
  // 明细
  if (o.items && typeof o.items==='string') {
    try { orderModalItems=JSON.parse(o.items); } catch(e) { orderModalItems=[]; }
  }
  renderOrderItems();
  updateOrderProgress();

  // 如果已结算，禁用保存
  if (o.payment_status==='已结算') {
    document.getElementById('btnSaveOrder').disabled=true;
    document.getElementById('btnSaveOrder').textContent='已结算 - 不可编辑';
  }
}

function addOrderItem() {
  orderModalItems.push({service:'',qty:1,copies:1,price:0,amount:0,recorder:'',note:''});
  renderOrderItems();
}

function removeOrderItem(idx) {
  orderModalItems.splice(idx,1);
  renderOrderItems();
}

function updateOrderItem(idx, field, val) {
  var item=orderModalItems[idx];
  item[field]=val;
  if (field==='qty'||field==='copies'||field==='price') {
    var qty=Number(item.qty)||0;
    var copies=Number(item.copies)||1;
    var price=Number(item.price)||0;
    item.amount=(qty*copies*price);
  }
  renderOrderItems();
}

function renderOrderItems() {
  var rows=''; var total=0;
  for (var i=0;i<orderModalItems.length;i++) {
    var it=orderModalItems[i];
    var amt=Number(it.amount)||0;
    total+=amt;
    rows+='<tr>';
    rows+='<td><input type="text" value="'+(it.service||'')+'" onchange="updateOrderItem('+i+',\'service\',this.value)" style="width:120px"></td>';
    rows+='<td><input type="number" value="'+it.qty+'" onchange="updateOrderItem('+i+',\'qty\',this.value)" style="width:70px" min="0"></td>';
    rows+='<td><input type="number" value="'+it.copies+'" onchange="updateOrderItem('+i+',\'copies\',this.value)" style="width:70px" min="1"></td>';
    rows+='<td><input type="number" value="'+it.price+'" onchange="updateOrderItem('+i+',\'price\',this.value)" style="width:90px" min="0" step="0.01"></td>';
    rows+='<td class="money">'+formatMoney(amt)+'</td>';
    rows+='<td><input type="text" value="'+(it.recorder||'')+'" onchange="updateOrderItem('+i+',\'recorder\',this.value)" style="width:80px"></td>';
    rows+='<td><input type="text" value="'+(it.note||'')+'" onchange="updateOrderItem('+i+',\'note\',this.value)" style="width:100px"></td>';
    rows+='<td><button class="btn btn-danger btn-sm" onclick="removeOrderItem('+i+')">删除</button></td>';
    rows+='</tr>';
  }
  document.getElementById('omItemsTbody').innerHTML=rows||'<tr><td colspan="8" style="text-align:center;color:#94a3b8">暂无明细</td></tr>';
  document.getElementById('omTotal').textContent=formatMoney(total);
}

function setOrderStatus(status) {
  document.getElementById('omStatus').value=status;
  updateOrderProgress();
}

function updateOrderProgress() {
  var s=document.getElementById('omStatus').value;
  var steps=['待确认','生产中','已完工','已送货'];
  for (var i=0;i<steps.length;i++) {
    var el=document.getElementById('ps'+(i+1));
    if (!el) continue;
    el.classList.remove('active','done');
    if (steps[i]===s) el.classList.add('active');
    else if (steps.indexOf(s)>i) el.classList.add('done');
  }
}

function loadCustomerSelect() {
  supabase.from('customers').select('id,name,contacts').then(function(res){
    var sel=document.getElementById('omCustomer');
    if (!sel) return;
    var opts='<option value="">请选择客户</option>';
    var listEl=document.getElementById('omContactList');
    var datalistHtml='';
    for (var i=0;i<(res.data||[]).length;i++) {
      var c=res.data[i];
      opts+='<option value="'+c.id+'">'+c.name+'</option>';
      // 联系人
      if (c.contacts) {
        var contacts=[];
        try { contacts=typeof c.contacts==='string'?JSON.parse(c.contacts):c.contacts; } catch(e){}
        for (var j=0;j<contacts.length;j++) {
          datalistHtml+='<option value="'+contacts[j].name+'">'+contacts[j].name+' ('+contacts[j].phone+')</option>';
        }
      }
    }
    sel.innerHTML=opts;
    if (listEl) listEl.innerHTML=datalistHtml;
    // 客户切换时更新联系人列表
    sel.onchange=function(){
      var cid=this.value;
      var dl=document.getElementById('omContactList');
      if (!dl) return;
      dl.innerHTML='';
      for (var k=0;k<(res.data||[]).length;k++) {
        if (res.data[k].id==cid && res.data[k].contacts) {
          var contacts=[];
          try { contacts=typeof res.data[k].contacts==='string'?JSON.parse(res.data[k].contacts):res.data[k].contacts; } catch(e){}
          for (var j=0;j<contacts.length;j++) {
            var opt=document.createElement('option');
            opt.value=contacts[j].name;
            dl.appendChild(opt);
          }
          break;
        }
      }
    };
  });
}

function loadServiceSelectData() {
  // 全局服务数据供订单明细使用
  window._serviceData=[];
  supabase.from('services').select('*').then(function(res){
    window._serviceData=res.data||[];
  });
}

function saveOrder() {
  var orderNo=document.getElementById('omOrderNo').value;
  var orderDate=document.getElementById('omOrderDate').value;
  var customerId=document.getElementById('omCustomer').value;
  var contactName=document.getElementById('omContact').value;
  var projectName=document.getElementById('omProject').value;
  var req=document.getElementById('omReq').value;
  var status=document.getElementById('omStatus').value;
  var paymentStatus=document.getElementById('omPaymentStatus').value;

  if (!customerId) { alert('请选择客户'); return; }
  if (!orderNo) { alert('订单编号不能为空'); return; }

  // 计算总金额
  var total=0;
  for (var i=0;i<orderModalItems.length;i++) { total+=Number(orderModalItems[i].amount)||0; }

  var customerName='';
  var custSel=document.getElementById('omCustomer');
  if (custSel) customerName=custSel.options[custSel.selectedIndex].text;

  var data={
    order_no:orderNo,
    order_date:orderDate,
    customer_id:customerId,
    customer_name:customerName,
    contact_name:contactName,
    project_name:projectName,
    production_req:req,
    status:status,
    payment_status:paymentStatus,
    total_amount:total,
    items:JSON.stringify(orderModalItems),
    user_id:currentUser.id
  };

  var promise;
  if (editingOrderId) {
    promise=supabase.from('orders').update(data).eq('id',editingOrderId);
  } else {
    promise=supabase.from('orders').insert(data);
  }

  promise.then(function(res){
    if (res.error) { alert('保存失败：'+res.error.message); return; }
    showToast(editingOrderId?'订单已更新':'订单已创建');
    closeOrderModal();
    loadOrders();
  });
}

function deleteOrder(id) {
  confirmDialog('确定要删除此订单吗？此操作不可恢复。',function(){
    supabase.from('orders').delete().eq('id',id).then(function(res){
      if (res.error) { alert('删除失败：'+res.error.message); return; }
      showToast('订单已删除');
      loadOrders();
    });
  });
}

function execOrderSearch() {
  var dFrom=document.getElementById('osDateFrom').value;
  var dTo=document.getElementById('osDateTo').value;
  var cust=document.getElementById('osCustomer').value.trim();
  var contact=document.getElementById('osContact').value.trim();
  var status=document.getElementById('osStatus').value;
  var payment=document.getElementById('osPayment').value;

  var q=supabase.from('orders').select('*').order('created_at',{ascending:false});
  if (dFrom) q=q.gte('order_date',dFrom);
  if (dTo) q=q.lte('order_date',dTo);
  if (cust) q=q.ilike('customer_name','%'+cust+'%');
  if (contact) q=q.ilike('contact_name','%'+contact+'%');
  if (status) q=q.eq('status',status);
  if (payment) q=q.eq('payment_status',payment);

  q.then(function(res){
    ordersData=res.data||[];
    ordersSelected={};
    renderOrdersTable();
    document.getElementById('searchModalOverlay').remove();
  });

function loadCustomers() {
  supabase.from('customers').select('*').order('created_at',{ascending:false}).then(function(res){
    customersData=res.data||[];
    renderCustTable();
  });
}

function renderCustTable() {
  var kw=(document.getElementById('custSearch')||{}).value||'';
  kw=kw.toLowerCase();
  var data=customersData.filter(function(c){
    if (!kw) return true;
    return (c.name||'').toLowerCase().indexOf(kw)>=0 || (c.phone||'').indexOf(kw)>=0;
  });
  var rows='';
  for (var i=0;i<data.length;i++) {
    var c=data[i];
    var contacts=[]; try { contacts=typeof c.contacts==='string'?JSON.parse(c.contacts):(c.contacts||[]); } catch(e){ contacts=[]; }
    var contactNames=contacts.map(function(ct){return ct.name;}).join('、');
    var contactPhones=contacts.map(function(ct){return ct.phone;}).join('、');
    rows+='<tr>';
    rows+='<td>'+c.name+'</td>';
    rows+='<td>'+contactNames+'</td>';
    rows+='<td>'+contactPhones+'</td>';
    rows+='<td>'+(c.address||'-')+'</td>';
    rows+='<td>'+formatDate(c.created_at)+'</td>';
    rows+='<td><button class="btn btn-outline btn-sm" onclick="openCustomerModal('+c.id+')">编辑</button> <button class="btn btn-danger btn-sm" onclick="deleteCustomer('+c.id+')">删除</button></td>';
    rows+='</tr>';
  }
  if (!rows) rows='<tr><td colspan="6" class="empty-state"><div class="empty-icon">👥</div><p>暂无客户</p></td></tr>';
  document.getElementById('custTbody').innerHTML=rows;
}

function custSearchKey(e) { if (e.key==='Enter'||e.keyCode===13) renderCustTable(); }

function addCustContact() { custContacts.push({name:'',phone:'',title:''}); renderCustContacts(); }
function removeCustContact(idx) { custContacts.splice(idx,1); renderCustContacts(); }
function updateCustContact(idx,field,val) { custContacts[idx][field]=val; }

function renderCustContacts() {
  var rows='';
  for (var i=0;i<custContacts.length;i++) {
    var ct=custContacts[i];
    rows+='<tr><td><input type="text" value="'+ct.name+'" onchange="updateCustContact('+i+',\'name\',this.value)"></td>';
    rows+='<td><input type="text" value="'+ct.phone+'" onchange="updateCustContact('+i+',\'phone\',this.value)"></td>';
    rows+='<td><input type="text" value="'+(ct.title||'')+'" onchange="updateCustContact('+i+',\'title\',this.value)"></td>';

function saveCustomer() {
  var name=document.getElementById('cmName').value.trim();
  if (!name) { alert('请输入客户名称'); return; }
  var data={name:name,address:document.getElementById('cmAddress').value,contacts:JSON.stringify(custContacts),user_id:currentUser.id};

      showToast('客户已删除');
      loadCustomers();
    });

function importCustomersCSV(input) {
  var file=input.files[0];
  if (!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var rows=csvToArray(e.target.result);
    if (rows.length<2) { alert('CSV格式不正确，至少需要表头+1行数据'); return; }
    var header=rows[0];
    var nameIdx=header.findIndex(function(h){return h.indexOf('名称')>=0||h==='name';});
    var phoneIdx=header.findIndex(function(h){return h.indexOf('电话')>=0||h==='phone';});
    var addrIdx=header.findIndex(function(h){return h.indexOf('地址')>=0||h==='address';});
    if (nameIdx<0) { alert('CSV缺少"名称"列'); return; }
    var inserts=[];
    for (var i=1;i<rows.length;i++) {
      var r=rows[i];
      var contacts=[{name:r[nameIdx]||'',phone:r[phoneIdx]||'',title:''}];
      inserts.push({name:r[nameIdx]||'',phone:r[phoneIdx]||'',address:r[addrIdx]||'',contacts:JSON.stringify(contacts),user_id:currentUser.id});
    }
    supabase.from('customers').insert(inserts).then(function(res){
      if (res.error) { alert('导入失败：'+res.error.message); return; }
      showToast('成功导入 '+inserts.length+' 条客户数据');
      loadCustomers();
    });
  };
  reader.readAsText(file);
}

  var h='<div class="modal-overlay show" id="empModalOverlay"><div class="modal" style="max-width:400px"><div class="modal-header"><h2>添加员工</h2><button class="modal-close" onclick="document.getElementById(\'empModalOverlay\').remove()">×</button></div><div class="modal-body">';
  h+='<div class="form-group"><label>账号名</label><input type="text" id="emAccount" placeholder="新员工登录账号"></div>';
  h+='<div class="form-group"><label>密码</label><input type="password" id="emPass" placeholder="至少6位"></div>';
  h+='<div class="form-group"><label>角色</label><select id="emRole"><option value="staff">staff - 业务员</option><option value="finance">finance - 财务</option><option value="operator">operator - 操作员</option><option value="admin">admin - 管理员</option></select></div>';
  h+='</div><div class="modal-footer"><button class="btn btn-outline" onclick="document.getElementById(\'empModalOverlay\').remove()">取消</button><button class="btn btn-primary" onclick="createEmployee()">创建账号</button></div></div></div>';
  document.getElementById('pageContent').insertAdjacentHTML('beforeend',h);
}

function createEmployee() {
  var account=document.getElementById('emAccount').value.trim();
  var pass=document.getElementById('emPass').value;
  var role=document.getElementById('emRole').value;
  if (!account||!pass) { alert('请输入账号名和密码'); return; }
  if (pass.length<6) { alert('密码至少6位'); return; }
  var email=account+'@erp.local';
  supabase.auth.signUp({email:email,password:pass,options:{data:{account:account,role:role}}}).then(function(res){
    if (res.error) { alert('创建失败：'+res.error.message); return; }
    // 创建 profiles 记录
    supabase.from('profiles').insert({id:res.data.user.id,account:account,role:role}).then(function(){
      showToast('员工账号已创建');
      document.getElementById('empModalOverlay').remove();
      loadEmployees();
    });
  });
}

function editEmployeeRole(id, account, currentRole) {
  var roles=['staff','finance','operator','admin'];
  var opts='';
  for (var i=0;i<roles.length;i++) { opts+='<option value="'+roles[i]+'"'+(roles[i]===currentRole?' selected':'')+'>'+roles[i]+'</option>'; }
  var h='<div class="modal-overlay show" id="editRoleOverlay"><div class="modal" style="max-width:400px"><div class="modal-header"><h2>编辑角色 - '+account+'</h2><button class="modal-close" onclick="document.getElementById(\'editRoleOverlay\').remove()">×</button></div><div class="modal-body"><div class="form-group"><label>角色</label><select id="erRole">'+opts+'</select></div></div><div class="modal-footer"><button class="btn btn-outline" onclick="document.getElementById(\'editRoleOverlay\').remove()">取消</button><button class="btn btn-primary" onclick="updateEmployeeRole(\''+id+'\')">保存</button></div></div></div>';
  document.getElementById('pageContent').insertAdjacentHTML('beforeend',h);
}

function updateEmployeeRole(id) {
  var role=document.getElementById('erRole').value;
  supabase.from('profiles').update({role:role}).eq('id',id).then(function(res){
    if (res.error) { alert('更新失败：'+res.error.message); return; }
    showToast('角色已更新');
    document.getElementById('editRoleOverlay').remove();
    loadEmployees();
  });
}

function deleteEmployee(id) {
  confirmDialog('确定要删除此员工吗？',function(){
    supabase.from('profiles').delete().eq('id',id).then(function(res){
      if (res.error) { alert('删除失败：'+res.error.message); return; }
      showToast('员工已删除'); loadEmployees();
    });
  });
}
</script>
</body>
</html>
